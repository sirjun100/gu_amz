# TG-API 管理后台 — Nginx 反向代理
#
# 用法（示例）：
#   sudo ln -sf /path/to/tg-api/nginx/nginx.conf /etc/nginx/sites-enabled/tg-api.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# 前置：本机已启动管理端（默认端口 5090）
#   PORT=5090 python app.py
#   或 uvicorn src.admin_app:app --host 127.0.0.1 --port 5090
#
# DNS：将 tgapi.tgitellyou.com 的 A 记录指向本服务器公网 IP。

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream tgapi_admin {
    server 127.0.0.1:5090;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name tgapi.tgitellyou.com;

    client_max_body_size 10m;

    location / {
        proxy_pass http://tgapi_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}

