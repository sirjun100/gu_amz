{% extends "base.html" %}

{% block content %}
    <h1>系统设置</h1>
    
    <!-- 系统设置表单 -->
    <div class="card">
        <div class="card-header">
            <h2>价格配置</h2>
        </div>
        <form action="{{ url_for('save_settings') }}" method="POST">
            <div class="form-group">
                <label for="PRICE_1">1次申请价格 (u)</label>
                <input type="number" id="PRICE_1" name="PRICE_1" min="0.01" step="0.01" value="{{ config.get('PRICE_1', '1.0') }}" required>
            </div>
            <div class="form-group">
                <label for="PRICE_5">5次申请价格 (u)</label>
                <input type="number" id="PRICE_5" name="PRICE_5" min="0.01" step="0.01" value="{{ config.get('PRICE_5', '4.0') }}" required>
            </div>
            <div class="form-group">
                <label for="BONUS_THRESHOLD">充值优惠阈值 (u)</label>
                <input type="number" id="BONUS_THRESHOLD" name="BONUS_THRESHOLD" min="1.0" step="1.0" value="{{ config.get('BONUS_THRESHOLD', '20') }}" required>
            </div>
            <div class="form-group">
                <label for="BONUS_RATE">充值优惠比例</label>
                <input type="number" id="BONUS_RATE" name="BONUS_RATE" min="0.0" max="1.0" step="0.01" value="{{ config.get('BONUS_RATE', '0.1') }}" required>
            </div>
            
            <button type="submit" class="button button-primary">保存配置</button>
        </form>
    </div>
    
    <div class="card">
        <div class="card-header">
            <h2>支付配置</h2>
        </div>
        <form action="{{ url_for('save_settings') }}" method="POST">
            <div class="form-group">
                <label for="OKPAY_WEBHOOK_URL">OKPay Webhook URL</label>
                <input type="text" id="OKPAY_WEBHOOK_URL" name="OKPAY_WEBHOOK_URL" value="{{ config.get('OKPAY_WEBHOOK_URL', '') }}">
            </div>
            <div class="form-group">
                <label for="TRC20_ADDRESS">TRC20 地址</label>
                <input type="text" id="TRC20_ADDRESS" name="TRC20_ADDRESS" value="{{ config.get('TRC20_ADDRESS', '') }}">
            </div>
            
            <button type="submit" class="button button-primary">保存配置</button>
        </form>
    </div>
{% endblock %}
